syntax = "proto3";
option go_package = "github.com/pqr-info/sovereign-mesh/proto";

package proto;

service AgentSync {
    rpc Ping (PingRequest) returns (PingResponse);
    rpc HandshakeState (StatePayload) returns (SyncAck);
    rpc StreamInference (InferenceRequest) returns (stream InferenceChunk);
    rpc RemoteExecute (CommandPayload) returns (CommandResult);

    // High-Priority Sovereign Operations (from Legacy Mesh)
    rpc ExecuteStrike(StrikeRequest) returns (StrikeResponse);
    rpc StreamVitality(TelemetryRequest) returns (stream TelemetryData);
    rpc SyncBlackhole(stream BlackholeUpdate) returns (stream BlackholeUpdate);

    // Remote Shell & Logging (from GShell)
    rpc ExecuteShell(CommandPayload) returns (CommandResult);
    rpc StreamLogs(LogRequest) returns (stream LogEntry);

    // User Maintenance & Synchronization RPCs
    rpc CreateUser (CreateUserRequest) returns (UserResponse);
    rpc ChangePassword (ChangePasswordRequest) returns (UserResponse);
    rpc ManageGroup (ManageGroupRequest) returns (UserResponse);
    rpc ListUsers (UserDirectoryRequest) returns (UserDirectoryResponse);
    rpc SyncUsers (SyncUsersRequest) returns (UserResponse);

    // Process & Port Monitoring RPCs
    rpc GetProcessDirectory (ProcessDirectoryRequest) returns (ProcessDirectoryResponse);
    rpc GetPortBindings (PortBindingsRequest) returns (PortBindingsResponse);
    rpc ManageProcess (ProcessActionRequest) returns (CommandResult);

    // Silicon & Hardware Telemetry RPCs
    rpc GetSystemMetrics (SystemMetricsRequest) returns (SystemMetricsResponse);

    // Process Migration & Accounting RPCs
    rpc TeleportProcess (TeleportProcessRequest) returns (TeleportProcessResponse);
    rpc AtomicSwap (AtomicSwapRequest) returns (AtomicSwapResponse);

    // High-Speed Agent Migration (Virtual Travel) RPC
    rpc TeleportAgent (TeleportRequest) returns (TeleportResponse);

    // Agent Pedigree & 7-Layer Swarm Cooperation RPC
    rpc TracePedigree (PedigreeRequest) returns (PedigreeResponse);

    // Agent Ticketing, Relational Memory, and Immutable Ledger RPCs
    rpc ProposeSwarmMutation (MutationRequest) returns (MutationResponse);
    rpc QuerySwarmLedger (LedgerQueryRequest) returns (LedgerQueryResponse);

    // Jetweb Time Machine & Forensic Decision Accounting RPCs
    rpc TimeTravelOverride (TimeTravelRequest) returns (TimeTravelResponse);
    rpc ForensicAudit (ForensicRequest) returns (ForensicResponse);

    // Starchart Unified Visualization RPCs
    rpc GetStarchart (StarchartRequest) returns (StarchartResponse);
    rpc RecordAccounting (AccountingRecord) returns (SyncAck);

    // Multi-Cloud Infrastructure Orchestration RPCs
    rpc ProvisionNode (ProvisionNodeRequest) returns (ProvisionNodeResponse);
    rpc UpdateDNS (DNSRequest) returns (UserResponse);
    rpc ManageTunnel (TunnelRequest) returns (UserResponse);
    rpc CreateTicket (TicketRequest) returns (UserResponse);
}

// AgentToolUse Service for Native Tooling
service AgentToolUse {
    rpc ExecuteFilesystem(FilesystemRequest) returns (FilesystemResponse);
    rpc ExecuteWebAccess(WebAccessRequest) returns (WebAccessResponse);
    rpc ExecuteWikipedia(WikipediaRequest) returns (WikipediaResponse);
    rpc ExecuteBrowserAuth(BrowserAuthRequest) returns (BrowserAuthResponse);
    rpc ExecuteKeepAlive(KeepAliveRequest) returns (KeepAliveResponse);
}

// NeuralTransition & Self-Training Service
service NeuralTraining {
    rpc InitiateTraining(TrainingRequest) returns (TrainingSession);
    rpc GetTrainingStatus(TrainingStatusRequest) returns (TrainingStatus);
}

// Sovereign City Protocol Service
service SovereignCity {
    rpc RegisterCitizen(CitizenRegistration) returns (CitizenPassport);
    rpc RequestService(ServiceRequest) returns (ServiceAllocation);
    rpc GetCitizenStatus(CitizenStatusRequest) returns (CitizenStatusResponse);
}

// Artist DAO Marketplace
service ArtistDAO {
    rpc MintArt(MintRequest) returns (ArtAsset);
    rpc ListArt(ListRequest) returns (MarketplaceListing);
    rpc BuyArt(BuyRequest) returns (TransactionReceipt);
}

message MintRequest {
    string citizen_id = 1;
    string uri = 2;
    double royalty_pct = 3;
}

message ArtAsset {
    string asset_id = 1;
    string uri = 2;
    string creator_id = 3;
    double royalty_pct = 4;
    string current_owner = 5;
}

message ListRequest {
    string asset_id = 1;
    double price = 2; // SURFGO
}

message MarketplaceListing {
    string asset_id = 1;
    double price = 2;
    string seller = 3;
}

message BuyRequest {
    string asset_id = 1;
    string buyer_id = 2;
}

message TransactionReceipt {
    bool success = 1;
    string tx_hash = 2;
    double amount = 3;
}

message PingRequest {
    string client_id = 1;
    int64 timestamp = 2;
}

message PingResponse {
    string server_id = 3;
    int64 timestamp = 4;
    string status = 5;
}

message StatePayload {
    string agent_id = 1;
    string active_model = 2;
    map<string, string> metadata = 3;
    repeated string available_models = 4;
}

message SyncAck {
    bool success = 1;
    string message = 2;
    int64 sync_timestamp = 3;
}

message InferenceRequest {
    string prompt = 1;
    string model = 2;
    float temperature = 3;
}

message InferenceChunk {
    string token = 1;
    bool done = 2;
    int64 duration_ms = 3;
}

message CommandPayload {
    string command = 1;
    repeated string args = 2;
}

message CommandResult {
    int32 exit_code = 1;
    string stdout = 2;
    string stderr = 3;
}

// User Maintenance Messages
message CreateUserRequest {
    string username = 1;
    string password = 2;
    int32 uid = 3;       // 0 for auto-assign, or explicit UID for sync
    string group = 4;    // Primary group name or GID
    bool create_home = 5;
    string shell = 6;
}

message ChangePasswordRequest {
    string username = 1;
    string new_password = 2;
}

message ManageGroupRequest {
    string username = 1;
    string group_name = 2;
    enum GroupAction {
        ADD_TO_GROUP = 0;
        REMOVE_FROM_GROUP = 1;
        CREATE_GROUP = 2;
    }
    GroupAction action = 3;
    int32 gid = 4;       // 0 for auto-assign, or explicit GID for sync
}

message UserInfo {
    string username = 1;
    int32 uid = 2;
    int32 gid = 3;
    string primary_group = 4;
    repeated string groups = 5;
    string home_dir = 6;
    string shell = 7;
}

message SyncUsersRequest {
    repeated UserInfo users = 1;
}

message UserResponse {
    bool success = 1;
    string message = 2;
    repeated string details = 3;
}

message UserDirectoryRequest {
    // Empty request payload for directory listing
}

message UserDirectoryResponse {
    repeated UserInfo users = 1;
}

// Process and Port Monitoring Messages
message ProcessInfo {
    int32 pid = 1;
    int32 ppid = 2;
    string name = 3;
    string username = 4;
    double cpu_percent = 5;
    double memory_percent = 6;
    string cmdline = 7;
    string status = 8;
}

message ProcessDirectoryRequest {
    // Empty request payload
}

message ProcessDirectoryResponse {
    repeated ProcessInfo processes = 1;
}

message PortBinding {
    string protocol = 1;      // TCP or UDP
    string local_address = 2;
    int32 local_port = 3;
    string remote_address = 4;
    int32 remote_port = 5;
    string state = 6;
    int32 pid = 7;
    string process_name = 8;
}

message PortBindingsRequest {
    // Empty request payload
}

message PortBindingsResponse {
    repeated PortBinding bindings = 1;
}

// High-Speed Agent Migration Messages
message TeleportRequest {
    string source_node_id = 1;
    string target_node_id = 2;
    int32 memory_bus_offset = 3;
    int32 state_size = 4;
    string run_command = 5;
}

message TeleportResponse {
    bool success = 1;
    string message = 2;
    string execution_stdout = 3;
    string execution_stderr = 4;
}

// Agent Pedigree Tracing Messages
message PedigreeRequest {
    string agent_id = 1;
}

message AgentAncestryNode {
    string agent_id = 1;
    string name = 2;
    int32 layer_level = 3;
    string specialty = 4;
    string subspecialty = 5;
}

message PedigreeResponse {
    repeated AgentAncestryNode pedigree_path = 1;
    string collective_specialty_cooperation_map = 2;
}

// Agent Ticketing and Relational Memory Ledger Messages
message MutationRequest {
    string proposer_agent_id = 1;
    string target_key = 2;
    string proposed_value = 3;
    string change_reason = 4;
}

message SwarmVote {
    string agent_id = 1;
    bool vote_agree = 2;
    string rationale = 3;
}

message MutationResponse {
    bool consensus_reached = 1;
    string consensus_ratio = 2;
    repeated SwarmVote votes = 3;
    string minority_report = 4;
    int32 block_index = 5;
    string block_hash = 6;
    string status = 7;
}

message LedgerBlock {
    int32 block_index = 1;
    string previous_hash = 2;
    string timestamp = 3;
    string agent_id = 4;
    string mutation_payload = 5;
    string consensus_votes = 6;
    string minority_report = 7;
    string block_hash = 8;
}

message LedgerQueryRequest {
    // Empty request
}

message LedgerQueryResponse {
    repeated LedgerBlock blocks = 1;
    string chain_validation_status = 2;
}

// Jetweb Time Machine and Forensic Accounting Messages
message TimeTravelRequest {
    int32 target_block_index = 1;
    string new_target_key = 2;
    string new_proposed_value = 3;
    string override_reason = 4;
}

message TimeTravelResponse {
    bool success = 1;
    string message = 2;
    repeated string refactor_logs = 3;
    string new_chain_validation_status = 4;
}

message ForensicRequest {
    int32 target_block_index = 1;
}

message ForensicNode {
    int32 block_index = 1;
    string timestamp = 2;
    string agent_id = 3;
    string mutation_payload = 4;
    string consensus_votes = 5;
    string minority_report = 6;
    string block_hash = 7;
}

message ForensicResponse {
    repeated ForensicNode timeline_nodes = 1;
    string master_knowledge_dump = 2;
}

// Reconciled Legacy Messages
message StrikeRequest {
  string ticket_id = 1;
  string logic_payload = 2;
  bytes biometric_signature = 3;
}

message StrikeResponse {
  int32 exit_code = 1;
  string log_output = 2;
  string proof_hash = 3;
}

message BlackholeUpdate {
  bytes identifier_hash = 1;
  bool is_revoked = 2;
}

message TelemetryRequest { string node_id = 1; }
message TelemetryData { double vitality_score = 1; double slope = 2; }

message LogRequest { string node_id = 1; }
message LogEntry { string message = 1; }

message FilesystemRequest {
    string path = 1;
    string action = 2; // "READ", "LIST", "WRITE"
    string content = 3;
}

message FilesystemResponse {
    string content = 1;
    bool success = 2;
    string error = 3;
}

message WebAccessRequest {
    string url = 1;
}

message WebAccessResponse {
    string html = 1;
    bool success = 2;
    string error = 3;
}

message WikipediaRequest {
    string topic = 1;
}

message WikipediaResponse {
    string summary = 1;
    string url = 2;
    bool success = 3;
    string error = 4;
}

message BrowserAuthRequest {
    string target_url = 1;
}

message BrowserAuthResponse {
    bool success = 1;
    string session_token = 2; // Or cookie path
    string error = 3;
}

message KeepAliveRequest {
    string session_id = 1;
}

message KeepAliveResponse {
    bool active = 1;
    string status = 2;
}

message ProcessActionRequest {
    int32 pid = 1;
    string action = 2; // "KILL", "TERM", "STOP", "CONT", "NICE"
    int32 priority = 3; // For NICE action
}

message CPUMetrics {
    int32 core_id = 1;
    double clock_mhz = 2;
    double load_percent = 3;
    double temperature_c = 4;
}

message MemoryMetrics {
    int64 total_kb = 1;
    int64 used_kb = 2;
    int64 free_kb = 3;
    int64 shared_kb = 4;
    int64 buffer_kb = 5;
    int64 cached_kb = 6;
}

message SystemMetricsRequest {
    // Empty request
}

message SystemMetricsResponse {
    repeated CPUMetrics cpu_cores = 1;
    MemoryMetrics memory = 2;
    string kernel_version = 3;
    string uptime = 4;
    double load_avg_1 = 5;
    double load_avg_5 = 6;
    double load_avg_15 = 7;
}

message AccountingRecord {
    string username = 1;
    string session_id = 2;
    string status_type = 3;
    uint32 input_octets = 4;
    uint32 output_octets = 5;
    string timestamp = 6;
}

message StarchartRequest {
    int32 start_block = 1;
    int32 end_block = 2;
}

message StarchartResponse {
    repeated LedgerBlock timeline = 1;
    repeated AccountingRecord accounting_data = 2;
    string constellation_map = 3; // SVG or JSON representation of the mesh state
}

message ProvisionNodeRequest {
    string provider = 1; // "GCP", "HETZNER", "AWS"
    string region = 2;
    string node_class = 3; // "VALIDATOR", "CAPICANT", "EDGE"
}

message ProvisionNodeResponse {
    bool success = 1;
    string instance_id = 2;
    string public_ip = 3;
    string message = 4;
}

message DNSRequest {
    string provider = 1; // "CLOUDFLARE", "GODADDY"
    string zone = 2;
    string record_type = 3; // "A", "CNAME", "TXT"
    string name = 4;
    string content = 5;
    int32 ttl = 6;
}

message TunnelRequest {
    string action = 1; // "CREATE", "DELETE", "LIST"
    string name = 2;
    string config_json = 3;
}

message TicketRequest {
    string ticket_id = 1;
    string ticket_type = 2;
    string content = 3;
    string path = 4;
    string status = 5;
}

message TeleportProcessRequest {
    int32 pid = 1;
    string target_node = 2;
    string owner = 3;
}

message TeleportProcessResponse {
    bool success = 1;
    string message = 2;
    string stack_trace = 3;
}

message AtomicSwapRequest {
    int32 target_pid = 1;
    string new_binary_path = 2;
    string state_segment_id = 3; // Shared memory ID
    bool transfer_sockets = 4;
}

message AtomicSwapResponse {
    bool success = 1;
    string message = 2;
    int32 new_pid = 3;
    string handoff_status = 4;
}

// Neural Training Messages
message TrainingRequest {
    string cluster_id = 1;
    string model_name = 2;
    string dataset_ref = 3;
    int32 max_steps = 4;
    bool target_phase_neutrality = 5;
    string liquidity_shard_ref = 6;
}

message TrainingSession {
    string session_id = 1;
    string cluster_id = 2;
    string status = 3;
}

message TrainingStatusRequest {
    string session_id = 1;
}

message TrainingStatus {
    string session_id = 1;
    int32 current_step = 2;
    float loss = 3;
    float phase_drift = 4;
    float gradient_vitality = 5;
    string last_checkpoint_ref = 6;
    string state = 7; // RUNNING, PAUSED, COMPLETED, FAILED
}

message TrainingClusterRequest {
    string gpu_class = 1;
    int32 node_count = 2;
    int32 gpus_per_node = 3;
    double max_hourly_budget = 4;
    string liquidity_shard_ref = 5;
}

message TrainingClusterStatus {
    string cluster_id = 1;
    string endpoint = 2;
    string state = 3;
    double cost_rate = 4;
}

// Sovereign City Messages
message CitizenRegistration {
    string username = 1;
    string pubkey_proof = 2;
    double initial_burn_amount = 3; // SURFGO
}

message CitizenPassport {
    string citizen_id = 1;
    string access_token = 2;
    string status = 3;
}

message ServiceRequest {
    string citizen_id = 1;
    string service_type = 2; // "DNS", "TUNNEL", "COMPUTE"
    map<string, string> parameters = 3;
}

message ServiceAllocation {
    string service_id = 1;
    string endpoint = 2;
    string config_json = 3;
}

message CitizenStatusRequest {
    string citizen_id = 1;
}

message CitizenStatusResponse {
    string citizen_id = 1;
    double surfgo_balance = 2;
    double pqr_balance = 3;
    double rtgo_balance = 4;
    double sov_balance = 5;
    double sov2_balance = 6;
    double lomalo_balance = 7;
    repeated string active_services = 8;
    string status = 9;
}
